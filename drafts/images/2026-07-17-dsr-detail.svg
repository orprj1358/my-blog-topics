<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="pagebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="rateCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="addCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="resultCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="dsrCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="finalCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7c2d12" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#c2843d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="url(#pagebg)"/>

  <text x="400" y="46" text-anchor="middle" font-size="24" font-weight="bold" fill="#7c2d12">스트레스 DSR 적용 구조</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#92714f">※ 아래 수치·막대 높이는 예시이며 실제 가산금리·한도와 무관합니다</text>

  <!-- rate calculation row -->
  <rect x="40" y="96" width="220" height="72" rx="14" fill="url(#rateCard)" stroke="#f59e0b" stroke-width="1.5" filter="url(#softShadow)"/>
  <circle cx="76" cy="132" r="16" fill="#d97706"/>
  <text x="76" y="137" text-anchor="middle" font-size="14" fill="#ffffff">%</text>
  <text x="165" y="126" text-anchor="middle" font-size="13.5" fill="#78350f">실제 대출 금리</text>
  <text x="165" y="145" text-anchor="middle" font-size="11.5" fill="#92714f">(예시)</text>

  <text x="278" y="140" text-anchor="middle" font-size="22" fill="#78350f">+</text>

  <rect x="296" y="96" width="220" height="72" rx="14" fill="url(#addCard)" stroke="#ea580c" stroke-width="1.5" filter="url(#softShadow)"/>
  <circle cx="332" cy="132" r="16" fill="#c2410c"/>
  <text x="332" y="137" text-anchor="middle" font-size="14" fill="#ffffff">+</text>
  <text x="421" y="126" text-anchor="middle" font-size="13.5" fill="#7c2d12">스트레스 가산금리</text>
  <text x="421" y="145" text-anchor="middle" font-size="11.5" fill="#92714f">(예시, 단계별 확대)</text>

  <text x="534" y="140" text-anchor="middle" font-size="22" fill="#78350f">=</text>

  <rect x="552" y="96" width="210" height="72" rx="14" fill="url(#resultCard)" filter="url(#softShadow)"/>
  <text x="657" y="126" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#ffffff">대출 심사 적용 금리</text>
  <text x="657" y="145" text-anchor="middle" font-size="11.5" fill="#ffedd5">(실제 금리보다 높음)</text>

  <line x1="657" y1="168" x2="657" y2="196" stroke="#c2843d" stroke-width="2.5" marker-end="url(#arrowA)"/>

  <!-- DSR calc box -->
  <rect x="497" y="196" width="270" height="62" rx="14" fill="url(#dsrCard)" stroke="#ea580c" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="632" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c2d12">DSR 계산</text>
  <text x="632" y="242" text-anchor="middle" font-size="11.5" fill="#92714f">연소득 대비 원리금 상환 비율</text>

  <line x1="632" y1="258" x2="632" y2="286" stroke="#c2843d" stroke-width="2.5" marker-end="url(#arrowA)"/>

  <!-- Result box -->
  <rect x="497" y="286" width="270" height="62" rx="14" fill="url(#finalCard)" filter="url(#softShadow)"/>
  <text x="632" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#fed7aa">대출 한도 결정</text>
  <text x="632" y="332" text-anchor="middle" font-size="11.5" fill="#ffedd5">한도 감소 방향으로 작용</text>

  <!-- bar chart card -->
  <rect x="40" y="196" width="410" height="222" rx="16" fill="#ffffff" stroke="#fde3c1" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="245" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c2d12">단계별 가산금리 폭 (개념 비교, 예시)</text>

  <line x1="100" y1="360" x2="400" y2="360" stroke="#d6c2a8" stroke-width="1.5"/>

  <rect x="130" y="322" width="42" height="38" rx="6" fill="url(#bar1)"/>
  <text x="151" y="380" text-anchor="middle" font-size="12.5" fill="#78350f">1단계</text>

  <rect x="230" y="290" width="42" height="70" rx="6" fill="url(#bar2)"/>
  <text x="251" y="380" text-anchor="middle" font-size="12.5" fill="#78350f">2단계</text>

  <rect x="330" y="252" width="42" height="108" rx="6" fill="url(#bar3)"/>
  <text x="351" y="380" text-anchor="middle" font-size="12.5" fill="#78350f">3단계</text>

  <text x="245" y="402" text-anchor="middle" font-size="11.5" fill="#92714f">가산금리 폭이 단계적으로 확대되는 개념</text>

  <!-- bottom summary -->
  <rect x="40" y="440" width="720" height="90" rx="16" fill="#ffffff" stroke="#fde3c1" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="400" y="470" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#7c2d12">핵심 요약</text>
  <text x="400" y="496" text-anchor="middle" font-size="13" fill="#57534e">가산금리 확대 → 심사 적용 금리 상승 → DSR 상 원리금 부담 증가 → 실제 대출 한도 축소</text>
  <text x="400" y="516" text-anchor="middle" font-size="11.5" fill="#a8a29e">본인의 정확한 한도는 금융기관 시뮬레이션으로 확인이 필요합니다</text>
</svg>
