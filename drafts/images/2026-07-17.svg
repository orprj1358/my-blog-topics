<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <circle cx="130" cy="520" r="220" fill="url(#glow)"/>
  <circle cx="1000" cy="90" r="260" fill="url(#glow)"/>
  <circle cx="150" cy="110" r="7" fill="#ffffff" opacity="0.35"/>
  <circle cx="200" cy="160" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="1080" cy="470" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="1030" cy="540" r="4" fill="#ffffff" opacity="0.25"/>

  <text x="90" y="120" font-size="22" font-weight="bold" fill="#a7f3d0" letter-spacing="2">AI 관련 소식</text>
  <rect x="90" y="140" width="64" height="6" rx="3" fill="#5eead4"/>

  <text x="88" y="270" font-size="54" font-weight="bold" fill="#ffffff">AI 에이전트,</text>
  <text x="88" y="336" font-size="54" font-weight="bold" fill="#ffffff">일하는 방식을 바꾸다</text>
  <text x="90" y="390" font-size="22" fill="#e0e7ff">챗봇을 넘어, 스스로 일을 끝내는 AI를 이해하는 법</text>

  <g transform="translate(870,300)">
