      <circle cx="-92" cy="20" r="6"/>
      <circle cx="92" cy="-20" r="6"/>
      <circle cx="92" cy="20" r="6"/>
      <circle cx="-20" cy="-92" r="6"/>
      <circle cx="20" cy="-92" r="6"/>
      <circle cx="-20" cy="92" r="6"/>
      <circle cx="20" cy="92" r="6"/>
    </g>

    <g stroke="#a5b4fc" stroke-width="2.5" opacity="0.75" fill="none">
      <path d="M -92 -20 Q -150 -70 -150 -130"/>
      <path d="M 92 20 Q 150 70 150 140"/>
      <path d="M 20 -92 Q 60 -150 130 -150"/>
