    <circle cx="0" cy="0" r="128" fill="#ffffff" opacity="0.08"/>

    <rect x="-60" y="-60" width="120" height="120" rx="24" fill="url(#chip)" opacity="0.95"/>
    <rect x="-34" y="-34" width="68" height="68" rx="12" fill="#312e81"/>
    <circle cx="0" cy="0" r="10" fill="#5eead4"/>

    <g stroke="url(#chip)" stroke-width="3" opacity="0.9">
      <line x1="-60" y1="-20" x2="-92" y2="-20"/>
      <line x1="-60" y1="20" x2="-92" y2="20"/>
      <line x1="60" y1="-20" x2="92" y2="-20"/>
      <line x1="60" y1="20" x2="92" y2="20"/>
      <line x1="-20" y1="-60" x2="-20" y2="-92"/>
      <line x1="20" y1="-60" x2="20" y2="-92"/>
      <line x1="-20" y1="60" x2="-20" y2="92"/>
      <line x1="20" y1="60" x2="20" y2="92"/>
