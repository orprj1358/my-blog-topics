<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2747"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1080" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="100" cy="560" r="180" fill="url(#glow)"/>

  <!-- house + discussion icon cluster -->
  <g transform="translate(140,170)">
    <circle cx="0" cy="0" r="92" fill="url(#ice)" opacity="0.95"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#1d4ed8" stroke-width="4" opacity="0.5"/>
    <!-- house silhouette -->
    <path d="M -46 30 L -46 -6 L 0 -34 L 46 -6 L 46 30 Z" fill="#1e3a5f" opacity="0.85"/>
    <rect x="-46" y="30" width="92" height="10" rx="3" fill="#1e3a5f" opacity="0.85"/>
    <rect x="-12" y="0" width="24" height="30" fill="#bfdbfe"/>
    <rect x="-34" y="6" width="14" height="14" fill="#bfdbfe"/>
    <rect x="20" y="6" width="14" height="14" fill="#bfdbfe"/>
  </g>

  <!-- speech bubble / discussion motif -->
  <g transform="translate(250,320)" opacity="0.92">
    <rect x="-30" y="-38" width="120" height="64" rx="18" fill="#eff6ff"/>
    <path d="M -10 26 L -10 44 L 12 26 Z" fill="#eff6ff"/>
    <circle cx="-4" cy="-6" r="6" fill="#1e3a5f"/>
    <circle cx="30" cy="-6" r="6" fill="#1e3a5f"/>
    <circle cx="64" cy="-6" r="6" fill="#1e3a5f"/>
  </g>
  <text x="180" y="440" text-anchor="middle" font-size="16" fill="#dbeafe">대통령 주재 부동산 대토론회 · 7월 23일</text>

  <!-- calendar / document accent -->
  <g transform="translate(1000,440)" opacity="0.6">
    <rect x="-34" y="-30" width="68" height="60" rx="8" fill="none" stroke="#dbeafe" stroke-width="4"/>
    <line x1="-34" y1="-12" x2="34" y2="-12" stroke="#dbeafe" stroke-width="4"/>
    <line x1="-16" y1="-40" x2="-16" y2="-22" stroke="#dbeafe" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="-40" x2="16" y2="-22" stroke="#dbeafe" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- title text block -->
  <text x="420" y="220" font-size="40" font-weight="bold" fill="#ffffff">부동산 대토론회,</text>
  <text x="420" y="278" font-size="40" font-weight="bold" fill="#ffffff">이번엔 뭐가 달라질까</text>
  <text x="420" y="322" font-size="18" fill="#dbeafe">공급·금융·세제 3대 쟁점, 종합대책 발표 앞둔 시점 점검</text>

  <!-- bottom tag -->
  <rect x="420" y="500" width="220" height="46" rx="23" fill="#ffffff" opacity="0.92"/>
  <text x="530" y="529" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a5f">부동산 · 정책</text>
</svg>
