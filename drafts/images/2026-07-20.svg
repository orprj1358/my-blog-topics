<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="55%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1080" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="100" cy="560" r="180" fill="url(#glow)"/>

  <!-- coin / percent icon cluster -->
  <g transform="translate(150,180)">
    <circle cx="0" cy="0" r="92" fill="url(#cream)" opacity="0.96"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#c2410c" stroke-width="4" opacity="0.5"/>
    <circle cx="0" cy="0" r="9" fill="#9a3412"/>
    <circle cx="26" cy="-26" r="9" fill="#9a3412"/>
    <line x1="-26" y1="26" x2="26" y2="-26" stroke="#9a3412" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- snowflake accent (ice age motif) -->
  <g transform="translate(255,330)" opacity="0.92" stroke="#fff7ed" stroke-width="5" stroke-linecap="round">
    <line x1="0" y1="-34" x2="0" y2="34"/>
    <line x1="-29" y1="-17" x2="29" y2="17"/>
    <line x1="-29" y1="17" x2="29" y2="-17"/>
    <line x1="-10" y1="-30" x2="-20" y2="-24"/>
    <line x1="10" y1="30" x2="20" y2="24"/>
  </g>
  <text x="185" y="440" text-anchor="middle" font-size="16" fill="#ffedd5">은행권 대출 한도 축소 · 심사 강화</text>

  <!-- document accent -->
  <g transform="translate(1000,440)" opacity="0.6">
    <rect x="-34" y="-30" width="68" height="60" rx="8" fill="none" stroke="#ffedd5" stroke-width="4"/>
    <line x1="-34" y1="-12" x2="34" y2="-12" stroke="#ffedd5" stroke-width="4"/>
    <line x1="-20" y1="4" x2="20" y2="4" stroke="#ffedd5" stroke-width="3"/>
    <line x1="-20" y1="16" x2="10" y2="16" stroke="#ffedd5" stroke-width="3"/>
  </g>

  <!-- title text block -->
  <text x="420" y="220" font-size="40" font-weight="bold" fill="#fffbeb">대출 빙하기,</text>
  <text x="420" y="278" font-size="40" font-weight="bold" fill="#fffbeb">지금 뭘 준비해야 할까</text>
  <text x="420" y="322" font-size="18" fill="#ffedd5">한도 축소 잇따르는 은행권, 실수요자 대비 포인트 점검</text>

  <!-- bottom tag -->
  <rect x="420" y="500" width="220" height="46" rx="23" fill="#fffbeb" opacity="0.94"/>
  <text x="530" y="529" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412">대출 · 금융</text>
</svg>
