<svg width="800" height="650" viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="pagebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="badgeA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="badgeB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="badgeC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="finalCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1e3a8a" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#4c6fab"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="650" fill="url(#pagebg)"/>

  <text x="400" y="46" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e3a8a">부처별 토론회 쟁점, 내일 하나로 모인다</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#3b5a9a">※ 아래 구분은 이해를 돕기 위한 예시이며, 실제 논의 내용과 다를 수 있습니다</text>

  <!-- card 1: 공급 -->
  <rect x="48" y="96" width="216" height="330" rx="18" fill="url(#cardA)" stroke="#93c5fd" stroke-width="1.5" filter="url(#softShadow)"/>
  <circle cx="86" cy="132" r="20" fill="url(#badgeA)"/>
  <text x="86" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">1</text>
  <text x="166" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#0c2340">공급</text>

  <rect x="66" y="164" width="180" height="1" fill="#93c5fd"/>

  <circle cx="80" cy="200" r="6" fill="#1e40af"/>
  <text x="96" y="205" font-size="12.5" fill="#1e3a8a">신규 택지 확보 방안</text>
  <circle cx="80" cy="234" r="6" fill="#1e40af"/>
  <text x="96" y="239" font-size="12.5" fill="#1e3a8a">재건축·재개발 속도 조절</text>
  <circle cx="80" cy="268" r="6" fill="#1e40af"/>
  <text x="96" y="273" font-size="12.5" fill="#1e3a8a">국토교통부 주관 논의</text>

  <rect x="66" y="360" width="180" height="46" rx="10" fill="#ffffff" opacity="0.75"/>
  <text x="156" y="379" text-anchor="middle" font-size="11.5" fill="#0c2340">"얼마나, 어디에</text>
  <text x="156" y="396" text-anchor="middle" font-size="11.5" fill="#0c2340">더 지을 것인가"</text>

  <!-- card 2: 금융 -->
  <rect x="292" y="96" width="216" height="330" rx="18" fill="url(#cardB)" filter="url(#softShadow)"/>
  <circle cx="330" cy="132" r="20" fill="url(#badgeB)"/>
  <text x="330" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">2</text>
  <text x="415" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">금융</text>

  <rect x="310" y="164" width="180" height="1" fill="#dbeafe" opacity="0.6"/>

  <circle cx="324" cy="200" r="6" fill="#eff6ff"/>
  <text x="340" y="205" font-size="12.5" fill="#eff6ff">가계대출 관리 기조</text>
  <circle cx="324" cy="234" r="6" fill="#eff6ff"/>
  <text x="340" y="239" font-size="12.5" fill="#eff6ff">실수요자 보호 방안</text>
  <circle cx="324" cy="268" r="6" fill="#eff6ff"/>
  <text x="340" y="273" font-size="12.5" fill="#eff6ff">금융위원회 주관 논의</text>

  <rect x="310" y="360" width="180" height="46" rx="10" fill="#ffffff" opacity="0.18"/>
  <text x="400" y="379" text-anchor="middle" font-size="11.5" fill="#eff6ff">"대출 문턱과</text>
  <text x="400" y="396" text-anchor="middle" font-size="11.5" fill="#eff6ff">실수요 보호 사이"</text>

  <!-- card 3: 세제 -->
  <rect x="536" y="96" width="216" height="330" rx="18" fill="url(#cardC)" filter="url(#softShadow)"/>
  <circle cx="574" cy="132" r="20" fill="url(#badgeC)"/>
  <text x="574" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">3</text>
  <text x="654" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">세제</text>

  <rect x="554" y="164" width="180" height="1" fill="#e0f2fe" opacity="0.6"/>

  <circle cx="568" cy="200" r="6" fill="#f0f9ff"/>
  <text x="584" y="205" font-size="12.5" fill="#f0f9ff">다주택자·1주택 구분</text>
  <circle cx="568" cy="234" r="6" fill="#f0f9ff"/>
  <text x="584" y="239" font-size="12.5" fill="#f0f9ff">세제개편안 방향 논의</text>
  <circle cx="568" cy="268" r="6" fill="#f0f9ff"/>
  <text x="584" y="273" font-size="12.5" fill="#f0f9ff">기획재정부 주관 논의</text>

  <rect x="554" y="360" width="180" height="46" rx="10" fill="#ffffff" opacity="0.16"/>
  <text x="644" y="379" text-anchor="middle" font-size="11.5" fill="#f0f9ff">"누구에게 어떻게</text>
  <text x="644" y="396" text-anchor="middle" font-size="11.5" fill="#f0f9ff">과세할 것인가"</text>

  <!-- arrows down to summary -->
  <line x1="156" y1="426" x2="380" y2="470" stroke="#4c6fab" stroke-width="2" marker-end="url(#arrowA)" opacity="0.7"/>
  <line x1="400" y1="426" x2="400" y2="470" stroke="#4c6fab" stroke-width="2" marker-end="url(#arrowA)" opacity="0.7"/>
  <line x1="644" y1="426" x2="420" y2="470" stroke="#4c6fab" stroke-width="2" marker-end="url(#arrowA)" opacity="0.7"/>

  <!-- bottom summary -->
  <rect x="60" y="478" width="680" height="132" rx="16" fill="url(#finalCard)" filter="url(#softShadow)"/>
  <text x="400" y="512" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#bfdbfe">7월 23일 대통령 주재 대토론회 → 세 갈래 논의 종합 예상</text>
  <text x="400" y="540" text-anchor="middle" font-size="13" fill="#e0f2fe">구체적 수치보다 정책 방향과 원칙 제시에 무게 실릴 가능성</text>
  <text x="400" y="568" text-anchor="middle" font-size="11.5" fill="#a8c3e8" opacity="0.9">위 구분·내용은 이해를 돕기 위한 예시이며 실제 발표 내용과 다를 수 있습니다</text>
  <text x="400" y="592" text-anchor="middle" font-size="11.5" fill="#a8c3e8" opacity="0.9">종합대책·세제개편안 등 후속 발표까지 확인한 뒤 판단하는 것이 안전합니다</text>
</svg>
