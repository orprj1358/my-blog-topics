<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1080" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="120" cy="560" r="200" fill="url(#glowSky)"/>

  <!-- house icon cluster -->
  <g transform="translate(150,190)">
    <circle cx="0" cy="0" r="94" fill="url(#house)" opacity="0.95"/>
    <circle cx="0" cy="0" r="94" fill="none" stroke="#1e3a8a" stroke-width="4" opacity="0.5"/>
    <!-- house silhouette -->
    <polygon points="0,-40 40,-6 40,40 -40,40 -40,-6" fill="#1e3a8a"/>
    <polygon points="0,-52 48,-10 34,-10 0,-38 -34,-10 -48,-10" fill="#0c2340"/>
    <rect x="-12" y="6" width="24" height="34" rx="2" fill="#7dd3fc"/>
    <rect x="-30" y="-14" width="14" height="14" rx="2" fill="#7dd3fc"/>
    <rect x="16" y="-14" width="14" height="14" rx="2" fill="#7dd3fc"/>
  </g>

  <!-- small building/skyline motif -->
  <g transform="translate(255,360)" opacity="0.9">
    <rect x="0" y="-10" width="14" height="30" fill="#7dd3fc"/>
    <rect x="20" y="-24" width="14" height="44" fill="#bae6fd"/>
    <rect x="40" y="-2" width="14" height="22" fill="#7dd3fc"/>
  </g>
  <text x="190" y="440" text-anchor="middle" font-size="16" fill="#bfdbfe">7월 23일 대통령 주재 대토론회</text>

  <!-- gavel/agenda accent -->
  <g transform="translate(1000,440)" opacity="0.6">
    <rect x="-34" y="-32" width="68" height="64" rx="8" fill="none" stroke="#e0f2fe" stroke-width="4"/>
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round"/>
    <line x1="-18" y1="6" x2="18" y2="6" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round"/>
    <line x1="-18" y1="22" x2="6" y2="22" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- title text block -->
  <text x="420" y="210" font-size="38" font-weight="bold" fill="#ffffff">내일 부동산 대토론회</text>
  <text x="420" y="266" font-size="38" font-weight="bold" fill="#ffffff">종합대책 윤곽 나올까</text>
  <text x="420" y="310" font-size="18" fill="#bfdbfe">공급·금융·세제, 부처별 쟁점 하루 전 총정리</text>

  <!-- bottom tag -->
  <rect x="420" y="500" width="180" height="46" rx="23" fill="#ffffff" opacity="0.92"/>
  <text x="510" y="529" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">부동산 정책</text>
</svg>
