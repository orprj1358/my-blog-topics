<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="pagebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="cardPast" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="cardToday" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="cardNext" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="badgePast" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="badgeToday" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="badgeNext" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1e3a8a" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#4c6fab"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="600" fill="url(#pagebg)"/>

  <text x="400" y="46" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e3a8a">지금까지의 논의, 오늘 한자리에서 정리된다</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#3b5a9a">※ 아래 흐름은 이해를 돕기 위한 예시이며, 실제 진행·발표 내용과 다를 수 있습니다</text>

  <!-- step 1: 지금까지 -->
  <rect x="40" y="104" width="210" height="340" rx="18" fill="url(#cardPast)" stroke="#93c5fd" stroke-width="1.5" filter="url(#softShadow)"/>
  <circle cx="76" cy="140" r="20" fill="url(#badgePast)"/>
  <text x="76" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">1</text>
  <text x="170" y="146" text-anchor="middle" font-size="15" font-weight="bold" fill="#0c2340">지금까지</text>

  <rect x="58" y="172" width="176" height="1" fill="#93c5fd"/>

  <circle cx="72" cy="206" r="6" fill="#1e40af"/>
  <text x="88" y="211" font-size="12.5" fill="#1e3a8a">국토부 · 공급 확대 토론회</text>
  <circle cx="72" cy="240" r="6" fill="#1e40af"/>
  <text x="88" y="245" font-size="12.5" fill="#1e3a8a">금융위 · 대출 규제 토론회</text>
  <circle cx="72" cy="274" r="6" fill="#1e40af"/>
  <text x="88" y="279" font-size="12.5" fill="#1e3a8a">기재부 · 세제 개편 토론회</text>

  <rect x="58" y="378" width="176" height="46" rx="10" fill="#ffffff" opacity="0.75"/>
  <text x="146" y="397" text-anchor="middle" font-size="11.5" fill="#0c2340">부처별로 나뉘어</text>
  <text x="146" y="414" text-anchor="middle" font-size="11.5" fill="#0c2340">진행된 사전 논의</text>

  <!-- step 2: 오늘 (highlighted, larger) -->
  <rect x="288" y="88" width="224" height="372" rx="20" fill="url(#cardToday)" filter="url(#softShadow)"/>
  <circle cx="330" cy="128" r="22" fill="url(#badgeToday)"/>
  <text x="330" y="135" text-anchor="middle" font-size="17" font-weight="bold" fill="#5a3d00">2</text>
  <text x="420" y="135" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">오늘</text>

  <rect x="308" y="160" width="196" height="1" fill="#bfdbfe" opacity="0.6"/>

  <text x="400" y="196" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#fde68a">대통령 주재</text>
  <text x="400" y="220" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#fde68a">부동산 대토론회</text>

  <circle cx="322" cy="252" r="6" fill="#e0f2fe"/>
  <text x="338" y="257" font-size="12.5" fill="#e0f2fe">공급·금융·세제 종합 논의</text>
  <circle cx="322" cy="286" r="6" fill="#e0f2fe"/>
  <text x="338" y="291" font-size="12.5" fill="#e0f2fe">세 갈래 쟁점 한자리 조율</text>
  <circle cx="322" cy="320" r="6" fill="#e0f2fe"/>
  <text x="338" y="325" font-size="12.5" fill="#e0f2fe">방향성·원칙 제시 예상</text>

  <rect x="308" y="396" width="196" height="50" rx="10" fill="#ffffff" opacity="0.16"/>
  <text x="406" y="416" text-anchor="middle" font-size="11.5" fill="#e0f2fe">"확정안보다</text>
  <text x="406" y="434" text-anchor="middle" font-size="11.5" fill="#e0f2fe">방향을 읽는 자리"</text>

  <!-- step 3: 앞으로 -->
  <rect x="550" y="104" width="210" height="340" rx="18" fill="url(#cardNext)" filter="url(#softShadow)"/>
  <circle cx="586" cy="140" r="20" fill="url(#badgeNext)"/>
  <text x="586" y="146" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">3</text>
  <text x="680" y="146" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">앞으로</text>

  <rect x="568" y="172" width="176" height="1" fill="#e0f2fe" opacity="0.6"/>

  <circle cx="582" cy="206" r="6" fill="#f0f9ff"/>
  <text x="598" y="211" font-size="12.5" fill="#f0f9ff">부동산 종합대책 발표</text>
  <circle cx="582" cy="240" r="6" fill="#f0f9ff"/>
  <text x="598" y="245" font-size="12.5" fill="#f0f9ff">세제개편안 구체화</text>
  <circle cx="582" cy="274" r="6" fill="#f0f9ff"/>
  <text x="598" y="279" font-size="12.5" fill="#f0f9ff">시행 세부안 순차 공개</text>

  <rect x="568" y="378" width="176" height="46" rx="10" fill="#ffffff" opacity="0.16"/>
  <text x="656" y="397" text-anchor="middle" font-size="11.5" fill="#f0f9ff">후속 발표까지</text>
  <text x="656" y="414" text-anchor="middle" font-size="11.5" fill="#f0f9ff">차분히 지켜볼 시점</text>

  <!-- connecting arrows -->
  <line x1="256" y1="270" x2="282" y2="270" stroke="#4c6fab" stroke-width="3" marker-end="url(#arrowA)" opacity="0.75"/>
  <line x1="518" y1="270" x2="544" y2="270" stroke="#4c6fab" stroke-width="3" marker-end="url(#arrowA)" opacity="0.75"/>

  <!-- bottom footnote -->
  <text x="400" y="484" text-anchor="middle" font-size="12" fill="#3b5a9a">실제 발표 시점과 세부 내용은 오늘 진행 상황에 따라 달라질 수 있습니다</text>
</svg>
