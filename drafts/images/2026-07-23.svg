<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1080" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="120" cy="560" r="200" fill="url(#glowSky)"/>

  <!-- house icon cluster -->
  <g transform="translate(150,190)">
    <circle cx="0" cy="0" r="94" fill="url(#house)" opacity="0.95"/>
    <circle cx="0" cy="0" r="94" fill="none" stroke="#1e3a8a" stroke-width="4" opacity="0.5"/>
    <polygon points="0,-40 40,-6 40,40 -40,40 -40,-6" fill="#1e3a8a"/>
    <polygon points="0,-52 48,-10 34,-10 0,-38 -34,-10 -48,-10" fill="#0c2340"/>
    <rect x="-12" y="6" width="24" height="34" rx="2" fill="#7dd3fc"/>
    <rect x="-30" y="-14" width="14" height="14" rx="2" fill="#7dd3fc"/>
    <rect x="16" y="-14" width="14" height="14" rx="2" fill="#7dd3fc"/>
  </g>

  <!-- podium / rostrum motif to signal "today's live event" -->
  <g transform="translate(255,360)" opacity="0.92">
    <rect x="-20" y="-6" width="40" height="30" rx="3" fill="#7dd3fc"/>
    <rect x="-4" y="-30" width="8" height="26" fill="#e0f2fe"/>
    <circle cx="0" cy="-38" r="7" fill="#e0f2fe"/>
  </g>
  <text x="255" y="440" text-anchor="middle" font-size="16" fill="#bfdbfe">D-DAY 대통령 주재 대토론회</text>

  <!-- calendar / agenda accent -->
  <g transform="translate(1000,440)" opacity="0.65">
    <rect x="-38" y="-34" width="76" height="66" rx="10" fill="none" stroke="#e0f2fe" stroke-width="4"/>
    <line x1="-38" y1="-16" x2="38" y2="-16" stroke="#e0f2fe" stroke-width="4"/>
    <circle cx="-16" cy="6" r="4" fill="#e0f2fe"/>
    <circle cx="4" cy="6" r="4" fill="#e0f2fe"/>
    <circle cx="24" cy="6" r="4" fill="#e0f2fe"/>
    <circle cx="-16" cy="22" r="4" fill="#e0f2fe"/>
    <circle cx="4" cy="22" r="4" fill="#ffffff"/>
  </g>

  <!-- title text block -->
  <text x="420" y="200" font-size="38" font-weight="bold" fill="#ffffff">오늘, 부동산 대토론회</text>
  <text x="420" y="256" font-size="38" font-weight="bold" fill="#ffffff">열리는 날</text>
  <text x="420" y="300" font-size="18" fill="#bfdbfe">공급·금융·세제, 오늘 한자리에서 정리된다</text>

  <!-- bottom tag -->
  <rect x="420" y="500" width="180" height="46" rx="23" fill="#ffffff" opacity="0.92"/>
  <text x="510" y="529" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">부동산 정책</text>
</svg>
